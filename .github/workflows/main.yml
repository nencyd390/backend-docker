name: CI-CD Docker Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ncd28
        password: Admin@123

    - name: Build Docker Image
      run: |
        docker build -t ncd28/backend-docker:latest .

    - name: Push Docker Image
  run: |
    docker push ncd28/backend-docker:latest
    docker push ncd28/backend-docker:latest

